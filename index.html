<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>шизофрения</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    #map { height: 100vh; width: 100%; }

    /* TOP BAR */
    .top-bar {
      position: fixed;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 8px;
      z-index: 4000;
    }

    .dropdown {
      position: relative;
    }

    .drop-btn {
      background: rgba(255,255,255,0.9);
      border: 1px solid #ccc;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .menu {
      position: absolute;
      top: 110%;
      left: 0;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      display: none;
      min-width: 160px;
    }

    .menu button {
      width: 100%;
      padding: 8px;
      border: none;
      background: white;
      cursor: pointer;
    }

    .menu button:hover {
      background: #eee;
    }

    .dropdown.open .menu {
      display: block;
    }

    /* RIGHT PANEL */
    .control-panel {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 3000;
    }

    .control-btn {
      background: rgba(255,255,255,0.9);
      border: 1px solid #ccc;
      padding: 6px;
      border-radius: 6px;
      cursor: pointer;
    }

    .layers-panel {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(255,255,255,0.95);
      padding: 6px;
      border-radius: 6px;
      z-index: 3000;
    }

    .layer-btn {
      display: block;
      margin: 4px 0;
    }

    .dark-theme { background:#1e1e1e; }
    .light-theme { background:#fff; }
  </style>
</head>

<body>

<div id="map" class="dark-theme"></div>

<!-- TOP CONTROLS -->
<div class="top-bar">

  <!-- MAP SELECT -->
  <div class="dropdown" id="mapSelect">
    <button class="drop-btn" id="mapBtn">world</button>
    <div class="menu">
      <button data-map="world">world</button>
      <button data-map="kiraine">kiraine</button>
      <button data-map="america">america</button>
      <button data-map="altworld">altworld</button>
    </div>
  </div>

  <!-- DATE SELECT -->
  <div class="dropdown" id="dateSelect">
    <button class="drop-btn" id="dateBtn">2026-06-04</button>
    <div class="menu">
      <button data-date="2026-06-04">2026-06-04</button>
    </div>
  </div>

</div>

<!-- SIDE -->
<div class="control-panel">
  <button class="control-btn" id="themeBtn">theme</button>
</div>

<div class="layers-panel" id="layers"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
/* =========================
   STATE
========================= */

let currentMap = "world";
let currentDate = "2026-06-04";

/* =========================
   MAP
========================= */

let map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -6,
  maxZoom: 2,
  attributionControl: false
});

let bounds = [[0,0],[10000,15000]];
map.fitBounds(bounds);
map.setMaxBounds([[-1000,-1000],[11000,16000]]);

/* =========================
   LAYERS FACTORY
========================= */

function loadLayers() {

  if (window.layersGroup) {
    window.layersGroup.forEach(l => map.removeLayer(l));
  }

  const fiction = L.imageOverlay(
    `images/${currentMap}/${currentDate}/fiction_countries.png`,
    bounds
  ).addTo(map);

  const real = L.imageOverlay(
    `images/shared/real_world/real_world.png`,
    bounds,
    {opacity:0.3}
  );

  const infra = L.imageOverlay(
    `images/${currentMap}/${currentDate}/infrastructure.png`,
    bounds
  );

  const cities = L.imageOverlay(
    `images/${currentMap}/${currentDate}/city_names.png`,
    bounds,
    {opacity:0.8}
  );

  const countries = L.imageOverlay(
    `images/${currentMap}/${currentDate}/country_names.png`,
    bounds,
    {opacity:0.8}
  );

  window.layersGroup = [fiction, real, infra, cities, countries];

}

/* =========================
   INIT
========================= */

loadLayers();

/* =========================
   MAP SELECT
========================= */

const mapBtn = document.getElementById("mapBtn");
const mapSelect = document.getElementById("mapSelect");

mapBtn.onclick = () => mapSelect.classList.toggle("open");

mapSelect.querySelectorAll("button[data-map]").forEach(btn => {
  btn.onclick = () => {
    currentMap = btn.dataset.map;
    mapBtn.textContent = currentMap;
    mapSelect.classList.remove("open");
    loadLayers();
  };
});

/* =========================
   DATE SELECT
========================= */

const dateBtn = document.getElementById("dateBtn");
const dateSelect = document.getElementById("dateSelect");

dateBtn.onclick = () => dateSelect.classList.toggle("open");

dateSelect.querySelectorAll("button[data-date]").forEach(btn => {
  btn.onclick = () => {
    currentDate = btn.dataset.date;
    dateBtn.textContent = currentDate;
    dateSelect.classList.remove("open");
    loadLayers();
  };
});

/* =========================
   CLOSE DROPDOWNS
========================= */

window.addEventListener("click", (e) => {
  if (!e.target.closest(".dropdown")) {
    document.querySelectorAll(".dropdown").forEach(d => d.classList.remove("open"));
  }
});

</script>

</body>
</html>
