<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>шизофрения</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }

    .control-panel {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 2000;
    }

    .top-left-panel {
      position: fixed;
      top: 10px;
      left: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 2000;
      background: rgba(255,255,255,0.9);
      padding: 6px;
      border-radius: 6px;
    }

    select {
      padding: 6px;
      border-radius: 6px;
    }

    .layers-panel {
      position: fixed;
      bottom: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: rgba(255,255,255,0.95);
      padding: 6px;
      border-radius: 6px;
      z-index: 2000;
    }

    .layer-btn {
      padding: 6px;
      border: 1px solid #999;
      border-radius: 5px;
      cursor: pointer;
      background: #f0f0f0;
    }

    .dark-theme { background:#1e1e1e; }
    .light-theme { background:#fff; }
  </style>
</head>

<body>

<div id="map" class="dark-theme"></div>

<!-- выбор карты и даты -->
<div class="top-left-panel">
  <select id="mapSelect"></select>
  <select id="dateSelect"></select>
</div>

<!-- слои -->
<div class="layers-panel" id="layers-panel"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
/* -----------------------------
   1. КОНФИГ КАРТ + ДАТ
------------------------------*/
const MAP_DATA = {
  world: ["2026-04-15", "2026-06-04"],
  kiraine: ["2026-05-10"],
  america: ["2026-01-01"],
  altworld: ["2025-05-21"]
};

/* -----------------------------
   2. ЛИСТ СЛОЁВ
------------------------------*/
const LAYERS = [
  "fiction_countries.png",
  "real_world.png",
  "infrastructure.png",
  "city_names.png",
  "country_names.png",
  "divisions.png",
  "layer13.png",
  "foto.png"
];

/* -----------------------------
   3. ИНИЦ КАРТЫ
------------------------------*/
let map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -6,
  maxZoom: 2,
  attributionControl: false
});

let bounds = [[0,0],[10000,15000]];
map.fitBounds(bounds);

/* -----------------------------
   4. DOM
------------------------------*/
const mapSelect = document.getElementById("mapSelect");
const dateSelect = document.getElementById("dateSelect");

/* -----------------------------
   5. ЗАПОЛНЯЕМ КАРТЫ
------------------------------*/
Object.keys(MAP_DATA).forEach(mapName => {
  let opt = document.createElement("option");
  opt.value = mapName;
  opt.textContent = mapName;
  mapSelect.appendChild(opt);
});

/* -----------------------------
   6. ОБНОВИТЬ ДАТЫ
------------------------------*/
function updateDates(mapName) {
  dateSelect.innerHTML = "";

  MAP_DATA[mapName].forEach(date => {
    let opt = document.createElement("option");
    opt.value = date;
    opt.textContent = date;
    dateSelect.appendChild(opt);
  });
}

/* -----------------------------
   7. ТЕКУЩИЕ СЛОИ
------------------------------*/
let currentLayers = [];

/* -----------------------------
   8. ЗАГРУЗКА СЛОЁВ
------------------------------*/
function loadMap(mapName, date) {

  currentLayers.forEach(l => map.removeLayer(l));
  currentLayers = [];

  let basePath = `images/${mapName}/${date}/`;

  LAYERS.forEach(file => {
    let layer = L.imageOverlay(basePath + file, bounds);
    layer.addTo(map);
    currentLayers.push(layer);
  });
}

/* -----------------------------
   9. СОБЫТИЯ
------------------------------*/
mapSelect.addEventListener("change", () => {
  updateDates(mapSelect.value);
  loadMap(mapSelect.value, MAP_DATA[mapSelect.value][0]);
});

dateSelect.addEventListener("change", () => {
  loadMap(mapSelect.value, dateSelect.value);
});

/* -----------------------------
   10. INIT
------------------------------*/
mapSelect.value = "world";
updateDates("world");
loadMap("world", MAP_DATA["world"][0]);

</script>

</body>
</html>
