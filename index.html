<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>шизофрения</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    #map { 
      height: 100vh; 
      width: 100%; 
    }

    .control-panel {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 3000;
    }

    .control-btn {
      background-color: rgba(255, 255, 255, 0.9);
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control-btn svg {
      width: 20px;
      height: 20px;
      stroke: #333;
    }

    .layers-panel {
      position: fixed;
      bottom: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: rgba(255,255,255,0.95);
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      z-index: 3000;
    }

    .layer-btn {
      padding: 6px 10px;
      border: 1px solid #999;
      border-radius: 4px;
      cursor: pointer;
      background: #f0f0f0;
    }

    .layer-btn.active {
      background: #bbb;
      font-weight: bold;
    }

    .dark-theme { background:#1e1e1e; }
    .light-theme { background:#fff; }
  </style>
</head>

<body>

<div id="map" class="dark-theme"></div>

<!-- КНОПКИ -->
<div class="control-panel">

  <!-- тема -->
  <button class="control-btn" id="theme-btn">
    🌙
  </button>

  <!-- скачать -->
  <a class="control-btn" download href="images/photo_2025-08-13_21-06-28.jpg">
    ⬇
  </a>

</div>

<!-- слои -->
<div class="layers-panel" id="layers-panel"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // =========================
  // 1. ДАТЫ (СИСТЕМА)
  // =========================
  const availableDates = ["2026-06-04"];
  const currentDate = availableDates[availableDates.length - 1]; // всегда последняя

  // =========================
  // 2. КАРТА
  // =========================
  const minZoom = window.innerWidth < 768 ? -6 : -4;

  const map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom,
    maxZoom: 2,
    attributionControl: false
  });

  const baseBounds = [[0,0],[10000,15000]];
  const safeBounds = [[-1000,-1000],[11000,16000]];

  map.fitBounds(baseBounds);
  map.setMaxBounds(safeBounds);

  // =========================
  // 3. СЛОИ (shared + date)
  // =========================

  const fictionCountries = L.imageOverlay(
    `images/world/${currentDate}/fiction_countries.png`,
    baseBounds
  ).addTo(map);

  const realWorld = L.imageOverlay(
    `images/shared/real_world/real_world.png`,
    baseBounds,
    {opacity: 0.3}
  );

  const infrastructure = L.imageOverlay(
    `images/world/${currentDate}/infrastructure.png`,
    baseBounds
  );

  const cityNames = L.imageOverlay(
    `images/world/${currentDate}/city_names.png`,
    baseBounds,
    {opacity: 0.8}
  );

  const countryNames = L.imageOverlay(
    `images/world/${currentDate}/country_names.png`,
    baseBounds,
    {opacity: 0.8}
  );

  const divisions = L.imageOverlay(
    `images/shared/divisions/divisions.png`,
    baseBounds
  );

  const foto = L.imageOverlay(
    `images/shared/foto/foto.png`,
    baseBounds
  );

  const layer13 = L.imageOverlay(
    `images/shared/layer13/layer13.png`,
    baseBounds
  );

  const overlayOrder = [
    fictionCountries,
    realWorld,
    infrastructure,
    divisions,
    countryNames,
    cityNames,
    layer13,
    foto
  ];

  const overlayMap = {
    "Фото": foto,
    "Layer 13": layer13,
    "Названия стран": countryNames,
    "Названия городов": cityNames,
    "Дивизии": divisions,
    "Инфраструктура": infrastructure,
    "Реальный мир": realWorld
  };

  // =========================
  // 4. UI СЛОЁВ
  // =========================
  const panel = document.getElementById("layers-panel");

  Object.keys(overlayMap).forEach(name => {
    const btn = document.createElement("button");
    btn.className = "layer-btn";
    btn.textContent = name;

    btn.onclick = () => {
      const layer = overlayMap[name];

      if (map.hasLayer(layer)) {
        map.removeLayer(layer);
        btn.classList.remove("active");
      } else {
        map.addLayer(layer);
        btn.classList.add("active");

        overlayOrder.forEach(l => {
          if (map.hasLayer(l)) l.bringToFront();
        });
      }
    };

    panel.appendChild(btn);
  });

  // =========================
  // 5. ТЕМА
  // =========================
  const themeBtn = document.getElementById("theme-btn");
  const mapDiv = document.getElementById("map");

  themeBtn.onclick = () => {
    if (mapDiv.classList.contains("dark-theme")) {
      mapDiv.classList.replace("dark-theme", "light-theme");
    } else {
      mapDiv.classList.replace("light-theme", "dark-theme");
    }
  };

  // =========================
  // 6. RESIZE ZOOM FIX
  // =========================
  window.addEventListener("resize", () => {
    map.setMinZoom(window.innerWidth < 768 ? -6 : -4);
  });

</script>

</body>
</html>
