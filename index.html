<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>map system</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body { margin:0; padding:0; height:100%; }

    #map {
      height: 100vh;
      width: 100%;
    }

    /* TOP BAR */
    .top-bar {
      position: fixed;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 8px;
      z-index: 5000;
    }

    .dropdown {
      position: relative;
    }

    .drop-btn {
      background: rgba(255,255,255,0.9);
      border: 1px solid #ccc;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .menu {
      position: absolute;
      top: 110%;
      left: 0;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      display: none;
      min-width: 160px;
      z-index: 6000;
    }

    .menu button {
      width: 100%;
      padding: 8px;
      border: none;
      background: white;
      cursor: pointer;
    }

    .menu button:hover {
      background: #eee;
    }

    .dropdown.open .menu {
      display: block;
    }

    /* RIGHT PANEL */
    .control-panel {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 5000;
    }

    .control-btn {
      background: rgba(255,255,255,0.9);
      border: 1px solid #ccc;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* LAYERS */
    .layers-panel {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(255,255,255,0.95);
      padding: 6px;
      border-radius: 6px;
      z-index: 5000;
      max-height: 50vh;
      overflow-y: auto;
    }

    .layer-btn {
      display: block;
      margin: 4px 0;
      padding: 4px 8px;
      border: 1px solid #999;
      background: #f0f0f0;
      cursor: pointer;
      border-radius: 4px;
    }

    .layer-btn.active {
      background: #bbb;
    }

    .dark-theme { background:#1e1e1e; }
    .light-theme { background:#fff; }

    /* FIX Leaflet zoom buttons overlap */
    .leaflet-top.leaflet-left {
      top: 90px !important;
    }

  </style>
</head>

<body>

<div id="map" class="dark-theme"></div>

<!-- TOP BAR -->
<div class="top-bar">

  <!-- MAP -->
  <div class="dropdown" id="mapSelect">
    <button class="drop-btn" id="mapBtn">world</button>
    <div class="menu">
      <button data-map="world">world</button>
      <button data-map="kiraine">kiraine</button>
      <button data-map="america">america</button>
      <button data-map="altworld">altworld</button>
    </div>
  </div>

  <!-- DATE -->
  <div class="dropdown" id="dateSelect">
    <button class="drop-btn" id="dateBtn">2026-06-04</button>
    <div class="menu">
      <button data-date="2026-06-04">2026-06-04</button>
    </div>
  </div>

</div>

<!-- RIGHT -->
<div class="control-panel">
  <button class="control-btn" id="themeBtn">theme</button>
  <a class="control-btn" href="images/photo_2025-08-13_21-06-28.jpg" download>download</a>
</div>

<!-- LAYERS -->
<div class="layers-panel" id="layers"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
/* ======================
   STATE
====================== */

let currentMap = "world";
let currentDate = "2026-06-04";

/* ======================
   MAP INIT
====================== */

let map = L.map("map", {
  crs: L.CRS.Simple,
  minZoom: -6,
  maxZoom: 2,
  attributionControl: false
});

let bounds = [[0,0],[10000,15000]];
let extendedBounds = [[-1000,-1000],[11000,16000]];

map.fitBounds(bounds);
map.setMaxBounds(extendedBounds);

/* ======================
   LAYERS
====================== */

let layerObjects = {};

function buildLayers() {

  // remove old layers
  Object.values(layerObjects).forEach(l => map.removeLayer(l));

  layerObjects = {

    fiction: L.imageOverlay(
      `images/${currentMap}/${currentDate}/fiction_countries.png`,
      bounds
    ).addTo(map),

    real: L.imageOverlay(
      `images/${currentMap}/${currentDate}/real_world.png`,
      bounds,
      {opacity:0.3}
    ),

    infra: L.imageOverlay(
      `images/${currentMap}/${currentDate}/infrastructure.png`,
      bounds
    ),

    cities: L.imageOverlay(
      `images/${currentMap}/${currentDate}/city_names.png`,
      bounds,
      {opacity:0.8}
    ),

    countries: L.imageOverlay(
      `images/${currentMap}/${currentDate}/country_names.png`,
      bounds,
      {opacity:0.8}
    )
  };

  layerObjects.fiction.addTo(map);

  renderLayers();
}

/* ======================
   LAYERS UI
====================== */

function renderLayers() {
  const box = document.getElementById("layers");
  box.innerHTML = "";

  Object.entries(layerObjects).forEach(([name, layer]) => {

    const btn = document.createElement("button");
    btn.className = "layer-btn";
    btn.textContent = name;

    btn.onclick = () => {

      if (map.hasLayer(layer)) {
        map.removeLayer(layer);
        btn.classList.remove("active");
      } else {
        map.addLayer(layer);
        btn.classList.add("active");
      }
    };

    box.appendChild(btn);
  });
}

/* ======================
   INIT
====================== */

buildLayers();

/* ======================
   MAP SELECT
====================== */

const mapBtn = document.getElementById("mapBtn");
const mapSelect = document.getElementById("mapSelect");

mapBtn.onclick = () => mapSelect.classList.toggle("open");

mapSelect.querySelectorAll("button[data-map]").forEach(b => {
  b.onclick = () => {
    currentMap = b.dataset.map;
    mapBtn.textContent = currentMap;
    mapSelect.classList.remove("open");
    buildLayers();
  };
});

/* ======================
   DATE SELECT
====================== */

const dateBtn = document.getElementById("dateBtn");
const dateSelect = document.getElementById("dateSelect");

dateBtn.onclick = () => dateSelect.classList.toggle("open");

dateSelect.querySelectorAll("button[data-date]").forEach(b => {
  b.onclick = () => {
    currentDate = b.dataset.date;
    dateBtn.textContent = currentDate;
    dateSelect.classList.remove("open");
    buildLayers();
  };
});

/* ======================
   THEME
====================== */

document.getElementById("themeBtn").onclick = () => {
  const m = document.getElementById("map");
  m.classList.toggle("dark-theme");
  m.classList.toggle("light-theme");
};

/* ======================
   CLOSE DROPDOWNS
====================== */

window.addEventListener("click", e => {
  if (!e.target.closest(".dropdown")) {
    document.querySelectorAll(".dropdown")
      .forEach(d => d.classList.remove("open"));
  }
});
</script>

</body>
</html>
